# Merge with the main file:
#   docker compose -f docker-compose.yml -f docker-compose.debug.yml up --build
#
# Then: Run and Debug → "Attach to Node (Docker api)".
# Debug mode runs tsc + node dist/server.js (not tsx) so breakpoints in src/ bind via inline source maps in dist/.

services:
  api:
    ports:
      - '9229:9229'
    environment:
      ENABLE_NODE_DEBUG: '1'
